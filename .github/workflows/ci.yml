# ============================================
# NuttyFans CI Pipeline
# ============================================
# Quality gates before deployment
# Reference: /tasks/2025-12-14__INFRASTRUCTURE-SETUP/02-ARCHITECTURE-REVIEW.mdc
# ============================================

name: CI

on:
  push:
    branches: [dev, qa, main]
  pull_request:
    branches: [dev, qa, main]

# Cancel in-progress runs when a new run is triggered
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # ----------------------------------------
      # Setup
      # ----------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ----------------------------------------
      # Prisma Client Generation
      # ----------------------------------------
      - name: Generate Prisma Client
        run: pnpm db:generate
        env:
          DATABASE_URL: 'postgresql://dummy:dummy@localhost:5432/dummy?sslmode=require'

      # ----------------------------------------
      # Quality Gates (All must pass)
      # ----------------------------------------
      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Build
        run: pnpm build
        env:
          # Provide dummy values for build-time env vars
          # Real values are set in Vercel for deployment
          DATABASE_URL: 'postgresql://dummy:dummy@localhost:5432/dummy?sslmode=require'

      # ----------------------------------------
      # Validation Complete
      # ----------------------------------------
      # If all checks pass, Vercel will handle deployment
      # via its GitHub integration (configured separately)
